<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yala Match - Teams</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <div>
        <h1 class="logo">⚽ Yala Match</h1>
        <p class="subtitle">Split Teams</p>
      </div>

      <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="players.html">Players</a>
        <a href="saved-teams.html">Saved Teams</a>
        <a href="match.html">Match</a>
        <a href="leagues.html">Leagues</a>
        <a href="history.html">History</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Generate Teams</h2>

      <div class="form-stack">
        <div class="form-group">
          <label for="splitMode">Split Mode</label>
          <select id="splitMode">
            <option value="random">Random</option>
            <option value="balanced">Balanced</option>
          </select>
        </div>

        <div class="form-group">
          <label for="teamCount">Number of Teams</label>
          <input type="number" id="teamCount" min="2" value="2" />
        </div>

        <div class="form-group">
          <label for="playersPerTeam">Players Per Team</label>
          <input type="number" id="playersPerTeam" min="1" value="5" />
        </div>

        <div class="form-group">
          <label for="teamNamesInput">Team Names</label>
          <input
            type="text"
            id="teamNamesInput"
            placeholder="e.g. Red Lions, Blue Stars, Falcons"
          />
          <div class="player-meta">
            Optional. Separate names with commas. If left empty, default names will be used.
          </div>
        </div>

        <button id="generateTeamsBtn" class="btn btn-primary" type="button">
          Generate Teams
        </button>

        <button id="saveTeamsBtn" class="btn btn-success" type="button">
          Save Generated Teams
        </button>
      </div>

      <div id="teamsMessage" class="message-box"></div>
    </section>

    <section class="card fairness-card">
      <h2>Fairness</h2>
      <p class="fairness-score">
        <span id="fairnessValue">0%</span>
      </p>
    </section>

    <section class="card">
      <h2>Choose Match Setup</h2>

      <div class="form-stack">
        <div class="form-group">
          <label for="matchLeagueSelect">League (optional)</label>
          <select id="matchLeagueSelect">
            <option value="">Friendly Match</option>
          </select>
        </div>

        <div class="form-group">
          <label for="matchTeamASelect">First Side</label>
          <select id="matchTeamASelect">
            <option value="">Select first team</option>
          </select>
        </div>

        <div class="form-group">
          <label for="matchTeamBSelect">Second Side</label>
          <select id="matchTeamBSelect">
            <option value="">Select second team</option>
          </select>
        </div>

        <button id="startMatchBtn" class="btn btn-primary" type="button">
          Start Match
        </button>
      </div>
    </section>

    <section class="card">
      <h2>Generated Teams</h2>
      <div id="teamsContainer" class="teams-layout"></div>
    </section>
  </main>

   <script type="module" src="js/auth-guard.js"></script>
  <script type="module" src="js/auth-ui.js"></script>
  <script src="js/storage.js"></script>
  <script type="module" src="js/team.js"></script>
</body>
</html>
